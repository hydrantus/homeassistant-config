- id: '1772056319139'
  alias: garage - fridge - temperature out of range notification
  triggers:
  - entity_id:
    - sensor.garage_temphum_fridge_temperature
    above: 4
    for:
      hours: 0
      minutes: 1
      seconds: 0
    trigger: numeric_state
  - entity_id: sensor.garage_temphum_fridge_temperature
    below: 1
    for:
      minutes: 20
    trigger: numeric_state
  actions:
  - action: notify.mobile_app_andrej_pixel_9_pro
    data:
      title: ⚠️ Fridge Temp Alert
      message: The fridge is currently at {{ states('sensor.fridge_temperature') }}°C
        for over 20 minutes.
      data:
        ttl: 0
        priority: high
  mode: single
