- id: '1766016065311'
  alias: kitchen - light - auto off after 10m
  description: ''
  triggers:
  - entity_id: switch.kitchen_shelly_switch_kitchen_lights
    to: 'on'
    trigger: state
  - trigger: state
    entity_id: binary_sensor.kitchen_sonoff_motion_sensor_occupancy
    to: 'off'
  conditions:
  - condition: state
    entity_id: switch.kitchen_shelly_switch_kitchen_lights
    state: 'on'
  - condition: state
    entity_id: binary_sensor.kitchen_sonoff_motion_sensor_occupancy
    state: 'off'
  actions:
  - wait_for_trigger:
    - entity_id:
      - binary_sensor.kitchen_sonoff_motion_sensor_occupancy
      to:
      - 'on'
      trigger: state
    timeout: 00:10:00
    continue_on_timeout: true
  - if:
    - condition: state
      entity_id: binary_sensor.kitchen_sonoff_motion_sensor_occupancy
      state:
      - 'off'
    then:
    - type: turn_off
      device_id: 5528980bdd500a3db02ff7ab0a9dc2f5
      entity_id: d42a63418c6e27abb73c066d013db095
      domain: switch
  mode: restart
