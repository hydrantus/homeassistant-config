- id: '1767565067124'
  alias: all - sleep mode from 23:00 to 7:00
  description: Turns sleep mode for all rooms based on time
  triggers:
  - at: '23:00:00'
    id: night_start
    trigger: time
  - at: 07:00:00
    id: night_end
    trigger: time
  actions:
  - target:
      entity_id:
      - switch.adaptive_lighting_sleep_mode_kids
      - switch.adaptive_lighting_sleep_mode_bathroom
      - switch.adaptive_lighting_sleep_mode_bedroom
      - switch.adaptive_lighting_sleep_mode_gallery
      - switch.adaptive_lighting_sleep_mode_garage
    action: switch.turn_{{ 'on' if trigger.id == 'night_start' else 'off' }}
  mode: restart
- id: '1767622948479'
