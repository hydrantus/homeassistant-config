
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 192.168.2.7
  ip_ban_enabled: false          # use this to enable auto IP ban
  login_attempts_threshold: 5

# influxdb:
#   api_version: 1
#   host: 192.168.2.7
#   port: 8428
#   max_retries: 3
#   include:
#     domains:
#       - sensor            # Energy, Temp, Humidity
#       - binary_sensor     # Motion, Doors
#       - light             # Gallery lights
#       - switch            # Shelly relays

prometheus:
  namespace: hass
  filter:
    include_domains:
      - sensor
      - binary_sensor
      - light
      - switch

panel_custom:
  - name: devices_link
    sidebar_title: Devices
    sidebar_icon: mdi:server-network
    js_url: /api/hassio/app/entrypoint.js
    url_path: config/integrations
    embed_iframe: true
    require_admin: true
    
  - name: automation_shortcut
    sidebar_title: Automations
    sidebar_icon: mdi:robot
    js_url: /api/hassio/app/entrypoint.js
    url_path: config/automation/dashboard
    embed_iframe: true
    require_admin: true